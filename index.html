    <a href="https://github.com/GenshinErebus/GachaDeadlines" target="_blank" class="desktop-only-github">Source
        Code</a>

    <script>
        (function () {
            const statusEl = document.getElementById('update-status');

            /* Force the browser to get a live server response, bypassing the cache */
            const cacheBuster = new Date().getTime();

            /* Fetch only the headers of script.js from your server */
            fetch(`script.js?cb=${cacheBuster}`, { method: 'HEAD' })
                .then(response => {
                    const lastModified = response.headers.get('Last-Modified');
                    if (lastModified) {
                        const date = new Date(lastModified);

                        /* Format the date to your style (e.g., "17 July 2026") */
                        const options = { day: 'numeric', month: 'long', year: 'numeric' };
                        const formattedDate = date.toLocaleDateString('en-US', options);

                        statusEl.textContent = `Updated ${formattedDate}`;
                    }
                })
                .catch(() => {
                    /* Silent fallback if server request fails */
                });
        })();
    </script>
