<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Event Deadlines</title>
    <link rel="stylesheet" href="style.css">
  </head>
<body>
    <nav class="game-selector">
        <select id="gameSelect" onchange="loadGameEvents()">
            <option value="">-- Select a Game --</option>
            <option value="genshin">✨ Genshin Impact</option>
            <option value="hsr">🚂 Honkai Star Rail</option>
            <option value="zzz">📼 Zenless Zone Zero</option>
            <option value="arknights">🏗️ Arknights Endfield</option>
            <option value="duet">🌗 Duet Night Abyss</option>
            <option value="nte">🌆 Neverness To Everness</option>
            <option value="mongil">🌟 MONGIL STAR DIVE</option>
            <option value="reverse1999">⏳ Reverse 1999</option>
            <option value="wuwa">🌊 Wuthering Waves</option>
        </select>
    </nav>
    <!-- Main content container -->
    <div class="container"></div>

    <!-- Load JavaScript -->
    <script src="script.js"></script>
<style>
  /* Responsive viewport container styling */
  .viewport-check { display: none; }

  @media (max-width: 480px) {
    .vp-small { display: block; }
  }
  
  @media (min-width: 481px) and (max-width: 768px) {
    .vp-medium { display: block; }
  }
  
  @media (min-width: 769px) and (max-width: 1200px) {
    .vp-large { display: block; }
  }
  
  @media (min-width: 1201px) {
    .vp-extra { display: block; }
  }
</style>

<!-- Anonymous visitor metrics -->
<img src="https://genshinerebus.goatcounter.com/count?p=/view-small" class="viewport-check vp-small" alt="">
<img src="https://genshinerebus.goatcounter.com/count?p=/view-medium" class="viewport-check vp-medium" alt="">
<img src="https://genshinerebus.goatcounter.com/count?p=/view-large" class="viewport-check vp-large" alt="">
<img src="https://genshinerebus.goatcounter.com/count?p=/view-extra" class="viewport-check vp-extra" alt="">
</body>
</html>
