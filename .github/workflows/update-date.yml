name: Auto Update Timestamp
permissions:
  contents: write
on:
  push:
    paths:
      - 'script.js'

jobs:
  update-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Insert current date
        run: |
          CURRENT_DATE="Updated $(date -u +'%d %B %Y')"
          sed -i "s|<!-- LAST_UPDATE_HERE -->.*<!-- END_UPDATE -->|<!-- LAST_UPDATE_HERE -->$CURRENT_DATE<!-- END_UPDATE -->|g" index.html

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update timestamp in index.html"
          file_pattern: 'index.html|sitemap.xml|.nojekyll'
